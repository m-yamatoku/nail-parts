<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廃盤パーツ一覧</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#faf9f7;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
#header{padding:14px 18px 0;background:#fff;border-bottom:1px solid #ece9e3;flex-shrink:0;}
#header h1{font-size:17px;font-weight:700;color:#6a6050;margin-bottom:2px;}
#header p{font-size:11px;color:#b0a890;margin-bottom:14px;}
#controls{padding:10px 14px;background:#fff;display:flex;gap:8px;border-bottom:1px solid #ece9e3;flex-shrink:0;}
#search{flex:1;padding:7px 11px;font-size:12px;border:1px solid #ddd8cf;border-radius:8px;background:#faf9f7;color:#2a2118;outline:none;font-family:inherit;}
#count{padding:5px 14px;font-size:11px;color:#c0b8a8;flex-shrink:0;}
#grid-wrap{flex:1;overflow-y:auto;padding:0 12px 16px;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;padding-top:8px;}
.card{background:#fff;border-radius:12px;border:1px solid #ece9e3;overflow:hidden;opacity:0.7;}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f5f2ed;filter:grayscale(30%);}
.card-body{padding:7px 9px 9px;}
.disc-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;margin-bottom:3px;font-weight:600;background:#f0ede8;color:#9a9080;}
.card-name{font-size:11px;line-height:1.4;color:#6a6050;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-code{font-size:10px;color:#c0b8a8;}
.empty{text-align:center;padding:3rem;color:#c0b8a8;font-size:13px;grid-column:1/-1;}
</style>
</head>
<body>
<div id="header">
  <h1>廃盤パーツ一覧</h1>
  <p id="total-count">読み込み中...</p>
</div>
<div id="controls">
  <input id="search" type="text" placeholder="商品名・型番で検索..." oninput="render()">
</div>
<div id="count"></div>
<div id="grid-wrap"><div id="grid"><div class="empty">読み込み中...</div></div></div>
<script>
const SB_URL='https://rhpjjntxgbemqrdbdmyy.supabase.co';
const SB_KEY='sb_publishable_eQMbb2aoA-57MDOhAktEtQ_l-KiT3rf';
let ALL=[];

async function fetchParts() {
  const res=await fetch(`${SB_URL}/rest/v1/parts?select=*&is_discontinued=eq.true&order=created_at.asc&limit=1000`,{
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}
  });
  ALL=await res.json();
  document.getElementById('total-count').textContent='廃盤商品 '+ALL.length+'件';
  render();
}

function render() {
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=ALL.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q));
  document.getElementById('count').textContent=filtered.length+'件';
  const grid=document.getElementById('grid');
  if(filtered.length===0){grid.innerHTML='<div class="empty">廃盤パーツはありません</div>';return;}
  grid.innerHTML=filtered.map(p=>`
    <div class="card">
      <img class="card-img" src="${p.image_url||''}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="card-body">
        <div class="disc-badge">廃盤</div>
        <div class="card-name">${p.name}</div>
        <div class="card-code">${p.code||''}</div>
      </div>
    </div>`).join('');
}
fetchParts();
</script>
</body>
</html>
